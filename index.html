<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Demandas</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <h1>Sistema de Demandas</h1>

        <section class="cadastro">

            <h2>Nova Demanda</h2>

            <form id="formDemanda">

                <div class="campo">
                    <label for="numero">Número da Demanda</label>
                    <input
                        type="text"
                        id="numero"
                        name="numero"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="assunto">Assunto</label>
                    <input
                        type="text"
                        id="assunto"
                        name="assunto"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="vencimento">Data de Vencimento</label>
                    <input
                        type="date"
                        id="vencimento"
                        name="vencimento"
                        required
                    >
                </div>

                <button type="submit">
                    Cadastrar Demanda
                </button>

            </form>

        </section>

        <section class="lista">

            <h2>Demandas Cadastradas</h2>

            <table>

                <thead>

                    <tr>
                        <th>Nº</th>
                        <th>Assunto</th>
                        <th>Vencimento</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="tabelaDemandas">

                    <!-- As demandas aparecerão aqui -->

                </tbody>

            </table>

        </section>

            <audio id="alarme">
                <source src="audio/alarme.mp3" type="audio/mpeg">
        </audio>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/script.js"></script>


</body>
</html>
